<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .quality-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .quality-card:hover {
            transform: translateY(-2px);
            background-color: rgba(13, 92, 185, 0.15);
            border-color: rgba(171, 199, 255, 0.4);
        }
        .quality-card.active {
            background-color: #0d5cb9;
            border-color: #abc7ff;
            box-shadow: 0 0 20px rgba(13, 92, 185, 0.3);
        }
        .quality-card.active .quality-text { color: #ffffff; }
        .quality-card.active .size-text { color: rgba(255, 255, 255, 0.8); }
        .glass-effect {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen selection:bg-primary/30">
<!-- Top Navigation Anchor (Shared Component) -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-outline-variant/10 flex justify-between items-center px-4 py-3 md:px-8">
<div class="font-headline-lg text-headline-lg text-primary tracking-tighter">Mp3 Juices</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity" data-icon="settings">settings</button>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-label-md">UP</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-4 md:px-8 max-w-container-max mx-auto">
<!-- Mock Search Result for Context -->
<div class="mb-12">
<h1 class="font-headline-xl text-headline-xl mb-6 text-primary">Search Results</h1>
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
<!-- Track Card 1 -->
<div class="bg-surface-container rounded-xl p-4 border border-outline-variant/10 hover:border-primary/30 transition-colors group">
<div class="aspect-square rounded-lg mb-4 overflow-hidden bg-surface-variant relative">
<img class="w-full h-auto" data-alt="A moody, high-contrast digital art album cover featuring deep blue nebulae and vibrant cyan electrical streaks. The style is modern and urban, with sharp geometric patterns overlaid. Atmospheric lighting creates a sense of deep space and energetic music, perfectly matching a dark-mode high-fidelity music app aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXQS_357z9-KYvnfsVPJR3L6DgJ3y9J78aQjuFtKNwMPcjV5-woRTTL_b_y1ohPE7cYjRU5HREKpbJxU_BI3REaNTtwYTfmpCXg4uPFEL5Ns2zFNnifzBa6C4Kcra3hPMb9rcSRFu0bkwyHRR2XWjICcvw1NTbtffn0YmgP_fr-e7hLH5Xezh9Ffg671n5xQ74mzdzi97A7pdytFX89V7OqEldb1UGk-OFvGixX8PDnrzk6srWYXB9KuTmXmmNTOYCjHG041ksKGw"/>
<button class="absolute bottom-3 right-3 w-12 h-12 bg-primary text-surface rounded-full flex items-center justify-center shadow-lg transform translate-y-2 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-300" onclick="document.getElementById('downloadModal').classList.remove('hidden')">
<span class="material-symbols-outlined">download</span>
</button>
</div>
<div class="font-label-md text-label-md text-primary mb-1">Midnight Pulse</div>
<div class="text-on-surface-variant text-body-sm font-body-sm">Synthetic Horizons</div>
</div>
</div>
</div>
</main>
<!-- Download Quality Dialog Modal -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-surface-container-lowest/80 backdrop-blur-sm" id="downloadModal">
<div class="bg-surface-container-high w-full max-w-md rounded-2xl border border-outline-variant/20 shadow-2xl overflow-hidden glass-effect animate-in fade-in zoom-in duration-300">
<!-- Header -->
<div class="p-6 border-b border-outline-variant/10 flex justify-between items-center">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Download Quality</h2>
<button class="material-symbols-outlined text-on-surface-variant hover:text-on-surface transition-colors" onclick="document.getElementById('downloadModal').classList.add('hidden')">close</button>
</div>
<!-- Content -->
<div class="p-6 space-y-4">
<p class="text-on-surface-variant text-body-sm font-body-sm mb-6">Select your preferred audio quality. Higher bitrates offer better sound but take up more space.</p>
<!-- Quality Options Stack -->
<div class="space-y-3">
<!-- High Quality -->
<label class="quality-card active flex items-center justify-between p-4 rounded-xl border border-outline-variant/30 cursor-pointer group" onclick="selectQuality(this)">
<input checked="" class="hidden" name="quality" type="radio"/>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-primary/20 flex items-center justify-center text-primary group-[.active]:text-white">
<span class="material-symbols-outlined">high_quality</span>
</div>
<div>
<div class="quality-text font-label-md text-label-md text-on-surface">High (320kbps)</div>
<div class="size-text text-body-sm font-body-sm text-on-surface-variant">Recommended for audiophiles</div>
</div>
</div>
<div class="text-primary font-label-md group-[.active]:text-white">~12.4 MB</div>
</label>
<!-- Medium Quality -->
<label class="quality-card flex items-center justify-between p-4 rounded-xl border border-outline-variant/30 cursor-pointer group" onclick="selectQuality(this)">
<input class="hidden" name="quality" type="radio"/>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">graphic_eq</span>
</div>
<div>
<div class="quality-text font-label-md text-label-md text-on-surface">Medium (192kbps)</div>
<div class="size-text text-body-sm font-body-sm text-on-surface-variant">Balance of size and quality</div>
</div>
</div>
<div class="text-on-surface-variant font-label-md">~7.8 MB</div>
</label>
<!-- Low Quality -->
<label class="quality-card flex items-center justify-between p-4 rounded-xl border border-outline-variant/30 cursor-pointer group" onclick="selectQuality(this)">
<input class="hidden" name="quality" type="radio"/>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-lg bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">speed</span>
</div>
<div>
<div class="quality-text font-label-md text-label-md text-on-surface">Low (128kbps)</div>
<div class="size-text text-body-sm font-body-sm text-on-surface-variant">Best for data saving</div>
</div>
</div>
<div class="text-on-surface-variant font-label-md">~5.2 MB</div>
</label>
</div>
<!-- Footer Action Area -->
<div class="pt-6 space-y-6">
<label class="flex items-center gap-3 cursor-pointer select-none">
<div class="relative flex items-center">
<input class="peer appearance-none w-5 h-5 rounded border-2 border-primary/40 checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-surface text-[16px] pointer-events-none opacity-0 peer-checked:opacity-100 left-0.5">check</span>
</div>
<span class="text-body-sm font-body-sm text-on-surface-variant">Remember my choice</span>
</label>
<div class="flex flex-col sm:flex-row gap-3">
<button class="flex-1 px-6 py-3 rounded-full border border-primary text-primary font-label-md hover:bg-primary/10 transition-colors" onclick="document.getElementById('downloadModal').classList.add('hidden')">Cancel</button>
<button class="flex-1 px-6 py-3 rounded-full bg-secondary text-on-secondary font-label-md hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-secondary/10">Download</button>
</div>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation (Shared Component) -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center pt-4 pb-8 px-4 bg-surface/90 backdrop-blur-2xl border-t border-outline-variant/5 shadow-xl rounded-t-xl">
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-label-sm text-label-sm">Search</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="library_music">library_music</span>
<span class="font-label-sm text-label-sm">Library</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</a>
</nav>
<script>
        function selectQuality(element) {
            // Remove active classes from all
            document.querySelectorAll('.quality-card').forEach(card => {
                card.classList.remove('active');
                card.querySelector('.quality-text').classList.remove('text-white');
                card.querySelector('.size-text').classList.add('text-on-surface-variant');
                card.querySelector('.size-text').classList.remove('text-white/80');
                
                const iconContainer = card.querySelector('div > div:first-child');
                iconContainer.classList.add('bg-surface-variant');
                iconContainer.classList.remove('bg-primary/20');
                iconContainer.classList.remove('text-white');
                iconContainer.classList.add('text-on-surface-variant');
            });

            // Add active to selected
            element.classList.add('active');
            const radio = element.querySelector('input[type="radio"]');
            if (radio) radio.checked = true;

            const activeIconContainer = element.querySelector('div > div:first-child');
            activeIconContainer.classList.remove('bg-surface-variant');
            activeIconContainer.classList.add('bg-primary/20');
            activeIconContainer.classList.add('text-white');
            activeIconContainer.classList.remove('text-on-surface-variant');
        }

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('downloadModal').classList.add('hidden');
            }
        });

        // Initial setup for the active High Quality item icons
        const initialActive = document.querySelector('.quality-card.active');
        if (initialActive) {
            const icon = initialActive.querySelector('div > div:first-child');
            icon.classList.remove('bg-surface-variant');
            icon.classList.add('bg-primary/20');
            icon.classList.add('text-white');
        }
    </script>
</body></html>

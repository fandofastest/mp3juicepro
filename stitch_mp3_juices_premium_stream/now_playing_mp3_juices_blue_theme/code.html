            backdrop-filter: blur(20px);

            box-shadow: 0 0 15px rgba(13, 92, 185, 0.4);

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;

                        "on-tertiary-fixed-variant": "#00458d",
                        "on-primary": "#002f66",
                        "primary": "#abc7ff",
                        "on-secondary-fixed-variant": "#4a473c",
                        "on-surface-variant": "#c2c6d4",

<style>

            min-height: max(884px, 100dvh);
        }

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Blurred Background Layer -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-background/70 z-10 backdrop-blur-3xl"></div>
<div class="w-full h-full bg-cover bg-center transition-all duration-1000 scale-110 opacity-40" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAa17ElQje7mLSOk9U0DLKnwR2ndEndTS1A-qBPtIz9f0eUA5P95WGvx2LvPYcaWvLO0Z8pj2ILwnZomEL79HOKuq3Kn8XYT8G5QI_RHowA7GUsRKaSVAiw84Yhr3iNbThYJEN0BksKRV-GPlyZKbWgGNHuL9A5N5lki8tPIs46Lk1si5VgdMTuslH2kmtGiLG9NvwjyC07d0HmC_ksY0Pnz79B6J9xdHxPDuzn7shkubWQH89e1sIAZG7jAK4g2A0NJjhlFntoXiA')">
</div>
</div>
<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-outline-variant/10 flex justify-between items-center px-margin-mobile py-sm">
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">expand_more</button>
<div class="flex flex-col items-center">
<span class="font-label-sm text-label-sm text-on-surface-variant tracking-widest uppercase">Now Playing</span>
<span class="font-headline-md text-headline-md text-primary tracking-tighter">Mp3 Juices</span>
</div>
<button class="material-symbols-outlined text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 duration-200">more_vert</button>
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-1 flex flex-col items-center justify-center px-margin-mobile pt-24 pb-32 max-w-lg mx-auto w-full">
<!-- Album Art Card -->
<div class="w-full aspect-square relative group">
<div class="absolute inset-0 bg-primary-container/20 rounded-xl blur-3xl opacity-0 group-hover:opacity-40 transition-opacity duration-500"></div>
<div class="w-full h-full rounded-xl overflow-hidden shadow-2xl relative z-10 glass-panel">
<img alt="Album Cover" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCr1XDDqNaWnJ1C_tYfxt0B2JTqZh7kHKZdTckPf_5I12GyMiC6s9ruXDg7meJrvLvYPxMAmOxiYqi2TIrHkRI79cVNsibyP6oyJaoPsO_JdMgMMuP2geioFRZE1tH41m0uMfHr47tK97ibZWCIyih8aaOK8Mb6ycCR5NXz7GYEpHVQcyuXMO2wxxgamcxAU4gcbMCevYcN5urO90me9GT6ZI1Jf6vGWpBeSz7gZvggXUBA8x-PfGX_4u7bsHvB3a1VO7gP9jVSJY4"/>
</div>
</div>
<!-- Metadata Section -->
<div class="w-full mt-lg flex justify-between items-end">
<div class="flex flex-col">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-xs">Electric Dreams</h1>
<p class="font-body-lg text-body-lg text-secondary opacity-80">Synthwave Collective</p>
</div>
<button class="material-symbols-outlined text-primary-container text-3xl mb-1 active:scale-90 transition-transform" style="font-variation-settings: 'FILL' 1;">favorite</button>
</div>
<!-- Playback Progress Section -->
<div class="w-full mt-lg">
<div class="relative w-full h-1 bg-surface-container-highest rounded-full cursor-pointer group">
<div class="absolute top-0 left-0 h-full w-[45%] bg-gradient-to-r from-primary to-primary-container rounded-full progress-bar-glow">
<div class="absolute right-0 top-1/2 -translate-y-1/2 w-3 h-3 bg-on-primary-container rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity"></div>
</div>
</div>
<div class="flex justify-between mt-sm">
<span class="font-label-sm text-label-sm text-on-surface-variant/70">2:14</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/70">4:48</span>
</div>
</div>
<!-- Controls Section -->
<div class="w-full mt-lg flex items-center justify-between">
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors">shuffle</button>
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-4xl text-on-surface-variant hover:text-primary active:scale-90 transition-all">skip_previous</button>
<button class="w-20 h-20 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-all" id="play-pause-btn">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1;">pause</span>
</button>
<button class="material-symbols-outlined text-4xl text-on-surface-variant hover:text-primary active:scale-90 transition-all">skip_next</button>
</div>
<button class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors">repeat</button>
</div>
</main>
<!-- Lyrics Swipe-Up Indicator -->
<div class="fixed bottom-0 left-0 w-full z-40 h-24 lyrics-gradient flex flex-col items-center justify-end pb-margin-mobile group cursor-pointer">
<div class="flex flex-col items-center animate-pulse-soft">
<span class="material-symbols-outlined text-on-surface-variant/80">keyboard_double_arrow_up</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/70 tracking-widest mt-1">LYRICS</span>
</div>
</div>
<script>
    const playBtn = document.getElementById('play-pause-btn');
    let isPlaying = true;

    playBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        const icon = playBtn.querySelector('span');
        icon.textContent = isPlaying ? 'pause' : 'play_arrow';
        
        if (isPlaying) {
            playBtn.classList.add('bg-primary-container', 'text-on-primary-container');
            playBtn.classList.remove('bg-surface-bright', 'text-on-surface');
        } else {
            playBtn.classList.remove('bg-primary-container', 'text-on-primary-container');
            playBtn.classList.add('bg-surface-bright', 'text-on-surface');
        }
    });

    let progress = 45;
    const progressBar = document.querySelector('.bg-gradient-to-r');
    
    setInterval(() => {
        if (isPlaying && progress < 100) {
            progress += 0.05;
            progressBar.style.width = `${progress}%`;
        }
    }, 1000);
</script>
</body></html>

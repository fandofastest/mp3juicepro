<span class="material-symbols-outlined text-on-surface-variant/80">keyboard_double_arrow_up</span>
<span class="font-label-sm text-label-sm text-on-surface-variant/60 tracking-widest mt-1">LYRICS</span>
</div>

<!-- Bottom Navigation Shell (Filter Applied: Transactional Screen - Hide BottomNavBar as this is a focused task) -->
<!-- Note: UI requirements specify playback controls as main interaction, global nav is suppressed to focus user on content -->
<script>
        // Micro-interactions
        const playBtn = document.getElementById('play-pause-btn');
        let isPlaying = true;

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            const icon = playBtn.querySelector('span');
            icon.textContent = isPlaying ? 'pause' : 'play_arrow';
            
            if (isPlaying) {
                playBtn.classList.add('bg-primary-container');
                playBtn.classList.remove('bg-surface-bright');
            } else {
                playBtn.classList.remove('bg-primary-container');
                playBtn.classList.add('bg-surface-bright');
            }
        });

        // Add visualizer-like micro-animation to progress bar (demo only)
        let progress = 45;
        const progressBar = document.querySelector('.bg-gradient-to-r');
        const currentTime = document.querySelectorAll('.font-label-sm')[1]; // Just for show
        
        setInterval(() => {
            if (isPlaying && progress < 100) {
                progress += 0.05;
                progressBar.style.width = `${progress}%`;
            }
        }, 1000);
    </script>

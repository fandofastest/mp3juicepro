<script>
        // Simple micro-interaction for the playlist rows
        const rows = document.querySelectorAll('.playlist-row');
        rows.forEach(row => {
            row.addEventListener('click', () => {
                // Clear previous selections (demo logic)
                rows.forEach(r => {
                    r.classList.remove('bg-surface-variant/40', 'border-primary/20');
                    r.querySelector('p').classList.remove('text-primary');
                    r.querySelector('p').classList.add('text-on-surface');
                    const indicator = r.querySelector('.w-6.h-6');
                    if(indicator.classList.contains('bg-primary')) {
                         indicator.classList.remove('bg-primary', 'shadow-[0_0_12px_rgba(13,92,185,0.5)]');
                         indicator.classList.add('border-2', 'border-outline-variant');
                         indicator.innerHTML = '<div class="w-3 h-3 rounded-full bg-primary opacity-0 transition-opacity"></div>';
                    }
                });

                // Set active state
                row.classList.add('bg-surface-variant/40', 'border-primary/20');
                const label = row.querySelector('p');
                label.classList.remove('text-on-surface');
                label.classList.add('text-primary');
                
                const indicator = row.querySelector('.w-6.h-6');
                indicator.classList.remove('border-2', 'border-outline-variant');
                indicator.classList.add('bg-primary', 'shadow-[0_0_12px_rgba(13,92,185,0.5)]');
                indicator.innerHTML = '<span class="material-symbols-outlined text-[16px] text-on-primary font-bold">check</span>';
            });
        });
    </script>
